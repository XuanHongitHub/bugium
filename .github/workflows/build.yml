name: Build and Release (All OS)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Fork release tag to publish (e.g. 146.0.7680.177-1.2-buglogin.1)"
        required: true
      windows_tag:
        description: "Optional upstream windows release tag override"
        required: false
      linux_tag:
        description: "Optional upstream linux release tag override"
        required: false
      macos_tag:
        description: "Optional upstream macos release tag override"
        required: false
  push:
    tags:
      - "*"

permissions:
  contents: write

concurrency:
  group: bugium-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      WINDOWS_REPO: ungoogled-software/ungoogled-chromium-windows
      LINUX_REPO: ungoogled-software/ungoogled-chromium-portablelinux
      MACOS_REPO: ungoogled-software/ungoogled-chromium-macos
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tags
        id: tags
        env:
          INPUT_RELEASE_TAG: ${{ github.event.inputs.release_tag }}
          INPUT_WINDOWS_TAG: ${{ github.event.inputs.windows_tag }}
          INPUT_LINUX_TAG: ${{ github.event.inputs.linux_tag }}
          INPUT_MACOS_TAG: ${{ github.event.inputs.macos_tag }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import subprocess
          import sys

          def gh_json(path: str):
            out = subprocess.check_output(["gh", "api", path], text=True)
            return json.loads(out)

          def latest_release_tag(repo: str):
            rel = gh_json(f"repos/{repo}/releases/latest")
            tag = (rel.get("tag_name") or "").strip()
            if not tag:
              raise SystemExit(f"No latest tag for {repo}")
            return tag

          event_name = os.environ.get("GITHUB_EVENT_NAME", "")
          github_ref = os.environ.get("GITHUB_REF", "")

          input_release = (os.environ.get("INPUT_RELEASE_TAG") or "").strip()
          input_windows = (os.environ.get("INPUT_WINDOWS_TAG") or "").strip()
          input_linux = (os.environ.get("INPUT_LINUX_TAG") or "").strip()
          input_macos = (os.environ.get("INPUT_MACOS_TAG") or "").strip()

          if event_name == "push" and github_ref.startswith("refs/tags/"):
            fork_tag = github_ref.split("refs/tags/", 1)[1].strip()
          else:
            fork_tag = input_release

          if not fork_tag:
            raise SystemExit("release_tag is required")

          windows_tag = input_windows or latest_release_tag(os.environ["WINDOWS_REPO"])
          linux_tag = input_linux or latest_release_tag(os.environ["LINUX_REPO"])
          macos_tag = input_macos or latest_release_tag(os.environ["MACOS_REPO"])

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
            fh.write(f"fork_tag={fork_tag}\n")
            fh.write(f"windows_tag={windows_tag}\n")
            fh.write(f"linux_tag={linux_tag}\n")
            fh.write(f"macos_tag={macos_tag}\n")

          print(f"fork_tag={fork_tag}")
          print(f"windows_tag={windows_tag}")
          print(f"linux_tag={linux_tag}")
          print(f"macos_tag={macos_tag}")
          PY

      - name: Download upstream assets
        run: |
          mkdir -p upstream-assets/windows upstream-assets/linux upstream-assets/macos dist

          gh release download "${{ steps.tags.outputs.windows_tag }}" \
            --repo "${WINDOWS_REPO}" \
            --dir upstream-assets/windows

          gh release download "${{ steps.tags.outputs.linux_tag }}" \
            --repo "${LINUX_REPO}" \
            --dir upstream-assets/linux

          gh release download "${{ steps.tags.outputs.macos_tag }}" \
            --repo "${MACOS_REPO}" \
            --dir upstream-assets/macos

      - name: Repackage and rename as Bugium
        env:
          FORK_TAG: ${{ steps.tags.outputs.fork_tag }}
          WINDOWS_TAG: ${{ steps.tags.outputs.windows_tag }}
          LINUX_TAG: ${{ steps.tags.outputs.linux_tag }}
          MACOS_TAG: ${{ steps.tags.outputs.macos_tag }}
        run: |
          python3 - <<'PY'
          import hashlib
          import json
          import os
          import pathlib
          import re
          import shutil
          import zipfile

          src_root = pathlib.Path("upstream-assets")
          out_dir = pathlib.Path("dist")
          out_dir.mkdir(parents=True, exist_ok=True)

          fork_tag = os.environ["FORK_TAG"]
          marker = {
            "browser": "bugium",
            "fork_tag": fork_tag,
            "upstream": {
              "windows": os.environ.get("WINDOWS_TAG"),
              "linux": os.environ.get("LINUX_TAG"),
              "macos": os.environ.get("MACOS_TAG"),
            },
            "packaging": "buglogin-fork-release",
          }

          def rename_text(name: str) -> str:
            return (
              name.replace("ungoogled-chromium", "bugium")
              .replace("Ungoogled-Chromium", "Bugium")
              .replace("Chromium", "Bugium")
              .replace("chromium", "bugium")
            )

          def include_asset(path: pathlib.Path) -> bool:
            name = path.name.lower()
            if name.endswith((".zip", ".tar.gz", ".tar.xz", ".dmg", ".AppImage".lower())):
              return True
            return False

          def platform_of(path: pathlib.Path) -> str:
            p = str(path).lower()
            if "/windows/" in p:
              return "windows"
            if "/linux/" in p:
              return "linux"
            if "/macos/" in p:
              return "macos"
            return "unknown"

          def normalize_zip_member_name(name: str) -> str:
            return rename_text(name)

          def write_checksum_line(file_path: pathlib.Path):
            digest = hashlib.sha256(file_path.read_bytes()).hexdigest()
            return f"{digest}  {file_path.name}"

          outputs = []

          for asset in sorted(src_root.rglob("*")):
            if not asset.is_file() or not include_asset(asset):
              continue

            plat = platform_of(asset)
            out_name = rename_text(asset.name)

            # normalize platform token for manifest detection
            if plat == "windows":
              out_name = re.sub(r"(win|windows)", "windows", out_name, flags=re.IGNORECASE)
            elif plat == "linux":
              out_name = re.sub(r"(lin|linux)", "linux", out_name, flags=re.IGNORECASE)
            elif plat == "macos":
              out_name = re.sub(r"(mac|darwin|osx)", "macos", out_name, flags=re.IGNORECASE)

            out_path = out_dir / out_name

            if asset.suffix.lower() == ".zip":
              with zipfile.ZipFile(asset, "r") as zin, zipfile.ZipFile(
                out_path, "w", compression=zipfile.ZIP_DEFLATED
              ) as zout:
                seen = set()
                roots = set()
                for info in zin.infolist():
                  if info.is_dir():
                    continue
                  n = normalize_zip_member_name(info.filename)
                  roots.add(n.split("/", 1)[0])
                  data = zin.read(info)
                  zout.writestr(n, data)
                  seen.add(n)

                  lower = n.lower()
                  if plat == "windows" and (lower.endswith("/chrome.exe") or lower.endswith("/chromium.exe")):
                    alias = n.rsplit("/", 1)[0] + "/bugium.exe"
                    if alias not in seen:
                      zout.writestr(alias, data)
                      seen.add(alias)

                for root in sorted(roots):
                  meta = f"{root}/BUGLOGIN_FORK_METADATA.json"
                  if meta not in seen:
                    zout.writestr(meta, json.dumps(marker, ensure_ascii=False, indent=2) + "\n")
            else:
              shutil.copy2(asset, out_path)

            outputs.append(out_path)

          if not outputs:
            raise SystemExit("No assets produced.")

          sums = [write_checksum_line(path) for path in sorted(outputs)]
          (out_dir / "bugium-sha256sums.txt").write_text("\n".join(sums) + "\n", encoding="utf-8")

          print("Produced assets:")
          for item in sorted(outputs):
            print(f"- {item.name}")
          PY

      - name: Publish GitHub release
        run: |
          TAG="${{ steps.tags.outputs.fork_tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes "BugLogin Bugium all-OS packaged release." \
              dist/*
          fi
