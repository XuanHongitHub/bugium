name: Publish Bugium Release (Source Artifacts)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Bugium release tag to publish in this repo (e.g. 146.0.7680.177-1.2-buglogin.1)"
        required: true
      windows_source_repo:
        description: "GitHub repo containing Windows source-build releases"
        required: false
        default: "XuanHongitHub/ungoogled-chromium-windows"
      linux_source_repo:
        description: "GitHub repo containing Linux source-build releases"
        required: false
        default: "XuanHongitHub/ungoogled-chromium-portablelinux"
      macos_source_repo:
        description: "GitHub repo containing macOS source-build releases"
        required: false
        default: "XuanHongitHub/ungoogled-chromium-macos"
      windows_source_tag:
        description: "Optional source release tag override for Windows"
        required: false
      linux_source_tag:
        description: "Optional source release tag override for Linux"
        required: false
      macos_source_tag:
        description: "Optional source release tag override for macOS"
        required: false
      require_bugium_named_assets:
        description: "Fail when downloaded asset names do not contain 'bugium'"
        required: false
        default: "true"
  push:
    tags:
      - "*"

permissions:
  contents: write

concurrency:
  group: bugium-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release context
        id: context
        env:
          INPUT_RELEASE_TAG: ${{ github.event.inputs.release_tag }}
          INPUT_WINDOWS_REPO: ${{ github.event.inputs.windows_source_repo }}
          INPUT_LINUX_REPO: ${{ github.event.inputs.linux_source_repo }}
          INPUT_MACOS_REPO: ${{ github.event.inputs.macos_source_repo }}
          INPUT_WINDOWS_TAG: ${{ github.event.inputs.windows_source_tag }}
          INPUT_LINUX_TAG: ${{ github.event.inputs.linux_source_tag }}
          INPUT_MACOS_TAG: ${{ github.event.inputs.macos_source_tag }}
          INPUT_REQUIRE_BUGIUM: ${{ github.event.inputs.require_bugium_named_assets }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import subprocess

          def latest_release_tag(repo: str) -> str:
            payload = json.loads(
              subprocess.check_output(["gh", "api", f"repos/{repo}/releases/latest"], text=True)
            )
            tag = (payload.get("tag_name") or "").strip()
            if not tag:
              raise SystemExit(f"No latest release tag found for {repo}")
            return tag

          event_name = (os.environ.get("GITHUB_EVENT_NAME") or "").strip()
          github_ref = (os.environ.get("GITHUB_REF") or "").strip()

          input_release = (os.environ.get("INPUT_RELEASE_TAG") or "").strip()
          release_tag = input_release
          if event_name == "push" and github_ref.startswith("refs/tags/"):
            release_tag = github_ref.split("refs/tags/", 1)[1].strip()

          if not release_tag:
            raise SystemExit("release_tag is required")

          windows_repo = (os.environ.get("INPUT_WINDOWS_REPO") or "XuanHongitHub/ungoogled-chromium-windows").strip()
          linux_repo = (os.environ.get("INPUT_LINUX_REPO") or "XuanHongitHub/ungoogled-chromium-portablelinux").strip()
          macos_repo = (os.environ.get("INPUT_MACOS_REPO") or "XuanHongitHub/ungoogled-chromium-macos").strip()

          windows_tag = (os.environ.get("INPUT_WINDOWS_TAG") or "").strip() or latest_release_tag(windows_repo)
          linux_tag = (os.environ.get("INPUT_LINUX_TAG") or "").strip() or latest_release_tag(linux_repo)
          macos_tag = (os.environ.get("INPUT_MACOS_TAG") or "").strip() or latest_release_tag(macos_repo)

          require_bugium = (os.environ.get("INPUT_REQUIRE_BUGIUM") or "true").strip().lower() in {"1", "true", "yes"}

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
            fh.write(f"release_tag={release_tag}\n")
            fh.write(f"windows_repo={windows_repo}\n")
            fh.write(f"linux_repo={linux_repo}\n")
            fh.write(f"macos_repo={macos_repo}\n")
            fh.write(f"windows_tag={windows_tag}\n")
            fh.write(f"linux_tag={linux_tag}\n")
            fh.write(f"macos_tag={macos_tag}\n")
            fh.write(f"require_bugium={'true' if require_bugium else 'false'}\n")

          print("Resolved release context:")
          print(f"  release_tag={release_tag}")
          print(f"  windows={windows_repo}@{windows_tag}")
          print(f"  linux={linux_repo}@{linux_tag}")
          print(f"  macos={macos_repo}@{macos_tag}")
          print(f"  require_bugium_named_assets={require_bugium}")
          PY

      - name: Download source-build assets
        run: |
          mkdir -p source-assets/windows source-assets/linux source-assets/macos dist

          gh release download "${{ steps.context.outputs.windows_tag }}" \
            --repo "${{ steps.context.outputs.windows_repo }}" \
            --dir source-assets/windows

          gh release download "${{ steps.context.outputs.linux_tag }}" \
            --repo "${{ steps.context.outputs.linux_repo }}" \
            --dir source-assets/linux

          gh release download "${{ steps.context.outputs.macos_tag }}" \
            --repo "${{ steps.context.outputs.macos_repo }}" \
            --dir source-assets/macos

      - name: Collect assets without binary repack
        env:
          REQUIRE_BUGIUM: ${{ steps.context.outputs.require_bugium }}
          WINDOWS_REPO: ${{ steps.context.outputs.windows_repo }}
          LINUX_REPO: ${{ steps.context.outputs.linux_repo }}
          MACOS_REPO: ${{ steps.context.outputs.macos_repo }}
          WINDOWS_TAG: ${{ steps.context.outputs.windows_tag }}
          LINUX_TAG: ${{ steps.context.outputs.linux_tag }}
          MACOS_TAG: ${{ steps.context.outputs.macos_tag }}
        run: |
          python3 - <<'PY'
          import hashlib
          import json
          import os
          import pathlib
          import re
          import shutil

          src_root = pathlib.Path("source-assets")
          out_dir = pathlib.Path("dist")
          out_dir.mkdir(parents=True, exist_ok=True)

          allow_suffixes = (
            ".zip",
            ".tar.gz",
            ".tar.xz",
            ".dmg",
            ".appimage",
            ".exe",
            ".msi",
            ".sha256",
            ".sha256sum",
            ".txt",
          )

          require_bugium = (os.environ.get("REQUIRE_BUGIUM") or "true").strip().lower() in {"1", "true", "yes"}
          produced = []
          has_bugium_named = False

          for asset in sorted(src_root.rglob("*")):
            if not asset.is_file():
              continue
            lower = asset.name.lower()
            if not lower.endswith(allow_suffixes):
              continue

            platform = "unknown"
            p = str(asset).lower()
            if "/windows/" in p:
              platform = "windows"
            elif "/linux/" in p:
              platform = "linux"
            elif "/macos/" in p:
              platform = "macos"

            out_name = f"{platform}-{asset.name}"
            out_path = out_dir / out_name
            shutil.copy2(asset, out_path)
            produced.append(out_path)

            if "bugium" in lower:
              has_bugium_named = True

          if not produced:
            raise SystemExit("No release assets found to publish.")

          if require_bugium and not has_bugium_named:
            raise SystemExit(
              "No asset filename contains 'bugium'. Refusing to publish non-branded artifacts. "
              "Set require_bugium_named_assets=false to bypass explicitly."
            )

          metadata = {
            "browser": "bugium",
            "packaging": "source-build-artifact-collector",
            "sources": {
              "windows": {
                "repo": os.environ.get("WINDOWS_REPO"),
                "tag": os.environ.get("WINDOWS_TAG"),
              },
              "linux": {
                "repo": os.environ.get("LINUX_REPO"),
                "tag": os.environ.get("LINUX_TAG"),
              },
              "macos": {
                "repo": os.environ.get("MACOS_REPO"),
                "tag": os.environ.get("MACOS_TAG"),
              },
            },
            "require_bugium_named_assets": require_bugium,
          }
          (out_dir / "bugium-source-release-metadata.json").write_text(
            json.dumps(metadata, ensure_ascii=False, indent=2) + "\n",
            encoding="utf-8",
          )

          sums = []
          for file_path in sorted(produced):
            digest = hashlib.sha256(file_path.read_bytes()).hexdigest()
            sums.append(f"{digest}  {file_path.name}")

          (out_dir / "bugium-sha256sums.txt").write_text("\n".join(sums) + "\n", encoding="utf-8")

          print("Published assets:")
          for f in sorted(produced):
            print(f"- {f.name}")
          PY

      - name: Publish GitHub release
        run: |
          TAG="${{ steps.context.outputs.release_tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes "Bugium release from source-build repositories." \
              dist/*
          fi
