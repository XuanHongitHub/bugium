name: Upstream Release Sync (Deprecated)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  blocked:
    runs-on: ubuntu-latest
    steps:
      - name: Block automatic upstream sync
        run: |
          echo "Automatic upstream release sync is disabled for Bugium."
          echo "Reason: Bugium now expects source-built, Bugium-branded artifacts."
          echo "Use build.yml and point windows/linux/macos source repos to your custom forks."
          exit 1
