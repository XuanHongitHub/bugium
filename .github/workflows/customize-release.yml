name: Customize Fork Release

on:
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: "Upstream tag to pull"
        required: false
      fork_tag:
        description: "Fork release tag to publish"
        required: false

permissions:
  contents: write
  actions: write

jobs:
  customize-release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      UPSTREAM_REPO: ungoogled-software/ungoogled-chromium-windows
      BROWSER_SLUG: bugium
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve upstream/fork tags
        id: tags
        env:
          INPUT_UPSTREAM_TAG: ${{ github.event.inputs.upstream_tag }}
          INPUT_FORK_TAG: ${{ github.event.inputs.fork_tag }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import subprocess
          import sys

          upstream_repo = os.environ["UPSTREAM_REPO"]
          input_upstream = (os.environ.get("INPUT_UPSTREAM_TAG") or "").strip()
          input_fork = (os.environ.get("INPUT_FORK_TAG") or "").strip()

          def gh_json(path: str):
            out = subprocess.check_output(["gh", "api", path], text=True)
            return json.loads(out)

          if input_upstream:
            upstream_tag = input_upstream
          else:
            releases = gh_json(f"repos/{upstream_repo}/releases?per_page=40")
            upstream_tag = ""
            for rel in releases:
              if rel.get("prerelease"):
                continue
              assets = rel.get("assets") or []
              if assets:
                upstream_tag = (rel.get("tag_name") or "").strip()
                if upstream_tag:
                  break
            if not upstream_tag:
              sys.exit("No stable upstream release with assets found.")

          fork_tag = input_fork or f"{upstream_tag}-buglogin.1"
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
            fh.write(f"upstream_tag={upstream_tag}\n")
            fh.write(f"fork_tag={fork_tag}\n")
          print(f"Resolved upstream_tag={upstream_tag} fork_tag={fork_tag}")
          PY

      - name: Skip when fork release already exists
        id: existing
        run: |
          TAG="${{ steps.tags.outputs.fork_tag }}"
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Fork release ${TAG} already exists."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download upstream assets
        if: steps.existing.outputs.exists == 'false'
        run: |
          mkdir -p upstream-assets dist
          gh release download "${{ steps.tags.outputs.upstream_tag }}" \
            --repo "${UPSTREAM_REPO}" \
            --dir upstream-assets
          if [[ -z "$(ls -A upstream-assets)" ]]; then
            echo "No upstream assets downloaded." >&2
            exit 1
          fi

      - name: Repackage assets with Bugium customization
        if: steps.existing.outputs.exists == 'false'
        env:
          UPSTREAM_TAG: ${{ steps.tags.outputs.upstream_tag }}
          FORK_TAG: ${{ steps.tags.outputs.fork_tag }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import pathlib
          import zipfile

          upstream_tag = os.environ["UPSTREAM_TAG"]
          fork_tag = os.environ["FORK_TAG"]
          src_dir = pathlib.Path("upstream-assets")
          out_dir = pathlib.Path("dist")
          out_dir.mkdir(parents=True, exist_ok=True)

          def rename_asset(name: str) -> str:
            return (
              name.replace("ungoogled-chromium", "bugium")
              .replace("chromium", "bugium")
              .replace("Chromium", "Bugium")
            )

          def normalize_member_name(name: str) -> str:
            return (
              name.replace("ungoogled-chromium", "bugium")
              .replace("chromium", "bugium")
              .replace("Chromium", "Bugium")
            )

          marker = {
            "browser": "bugium",
            "upstream_tag": upstream_tag,
            "fork_tag": fork_tag,
            "customization": "buglogin-custom-repackage",
            "changes": [
              "renamed archive members from ungoogled-chromium to bugium",
              "added bugium.exe alias for chrome.exe",
              "excluded installer executables to avoid upstream installer branding",
            ],
          }

          release_note = (
            "This package is customized for BugLogin as Bugium.\n"
            "Launcher: use bugium.exe (alias of chrome.exe).\n"
            "Profile title native patch requires source-build stage and is not provided by repack-only flow.\n"
          )

          for asset in sorted(src_dir.iterdir()):
            if not asset.is_file():
              continue
            if asset.suffix.lower() != ".zip":
              # Skip installer binaries from upstream because installer UI/version-info
              # branding remains upstream and causes inconsistent user-facing identity.
              print(f"Skip non-zip asset: {asset.name}")
              continue
            out_name = rename_asset(asset.name)
            out_path = out_dir / out_name
            with zipfile.ZipFile(asset, "r") as zin, zipfile.ZipFile(
              out_path, "w", compression=zipfile.ZIP_DEFLATED
            ) as zout:
              seen = set()
              top_roots = set()
              for info in zin.infolist():
                if info.is_dir():
                  continue
                original_name = info.filename
                normalized = normalize_member_name(original_name)
                top = normalized.split("/", 1)[0]
                top_roots.add(top)
                data = zin.read(info)
                zout.writestr(normalized, data)
                seen.add(normalized)

                # Add bugium.exe alias for easier integration with BugLogin runtime.
                if normalized.lower().endswith("/chrome.exe"):
                  alias = normalized[:-len("chrome.exe")] + "bugium.exe"
                  if alias not in seen:
                    zout.writestr(alias, data)
                    seen.add(alias)

              for root in sorted(top_roots):
                meta_path = f"{root}/BUGLOGIN_FORK_METADATA.json"
                if meta_path not in seen:
                  zout.writestr(meta_path, json.dumps(marker, ensure_ascii=False, indent=2) + "\n")
                note_path = f"{root}/BUGLOGIN_BRANDING.txt"
                if note_path not in seen:
                  zout.writestr(note_path, release_note)

          print("Customized assets:")
          for item in sorted(out_dir.iterdir()):
            print(f"- {item.name}")
          PY

      - name: Publish fork release
        if: steps.existing.outputs.exists == 'false'
        run: |
          TAG="${{ steps.tags.outputs.fork_tag }}"
          gh release create "${TAG}" \
            --title "${TAG}" \
            --notes "BugLogin customized Bugium release (zip-only) from upstream ${{ steps.tags.outputs.upstream_tag }}."
          gh release upload "${TAG}" dist/*

      - name: Trigger manifest publish
        if: steps.existing.outputs.exists == 'false'
        run: |
          gh workflow run release-manifest.yml --ref "${GITHUB_REF_NAME}" -f version="${{ steps.tags.outputs.fork_tag }}"
